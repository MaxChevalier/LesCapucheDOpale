name: CI Main

# Trigger
on:
    pull_request:
        branches: ["main","dev"]
        types: [opened, synchronize]

# JOBS
jobs:
    test-front:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20.19'

            - name: Front - Install
              run: npm install
              working-directory: ./front
            
            - name: Install Google Chrome
              uses: browser-actions/setup-chrome@v1

            - name: Front - Run CI
              env:
                CHROME_BIN: /usr/bin/google-chrome-stable
              run: npm run testCi
              working-directory: ./front

    test-back:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '18'

            - name: Back - Install
              run: npm install
              working-directory: ./back
            
            - name: Back - Build
              run: npm run build
              working-directory: ./back

            - name: Back - Lint
              run: npm run test
              working-directory: ./back
              
            - name: Back - Build
              run: npm run build
              working-directory: ./back