name: CI Main

# Trigger
on:
    pull_request:
        branches: ["main","dev"]
        types: [opened, synchronize]

# JOBS
jobs:
    test-front:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20.19'

            - name: Front - Install
              run: npm install
              working-directory: ./front
            
            - name: Front - Run CI
              run: npm run testCi
              working-directory: ./front

    test-back:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '18'

            - name: Back - Install
              run: npm install
              working-directory: ./back
            
            - name: Back - Build
              run: npm run build
              working-directory: ./back

            - name: Back - Lint
              run: npm run test
              working-directory: ./back
              
            - name: Back - Build
              run: npm run build
              working-directory: ./back